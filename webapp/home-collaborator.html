<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Collaboratore</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 50px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; text-align: center; }
        .field { margin-bottom: 15px; }
        .field label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .field input, .field select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button[type="submit"], #btn-hc-logout { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button[type="submit"]:hover, #btn-hc-logout:hover { background: #0056b3; }
        #btn-hc-logout { background: #6c757d; }
        #btn-hc-logout:hover { background: #545b62; }
        .msg-error, .msg-success { margin-top: 15px; font-weight: bold; display: none; text-align: center; }
        .msg-error { color: #dc3545; }
        .msg-success { color: #28a745; }
    </style>
</head>
<body>

<div class="container" id="home-collaborator-section">
    <h2>Home Collaboratore</h2>
    <p>Benvenuto, <span id="hc-fullname"></span></p>

    <p class="msg-error" id="hc-error"></p>
    <p class="msg-success" id="hc-success"></p>

    <div class="field">
        <label for="hc-project">Progetto</label>
        <select id="hc-project">
            <option value="">-- seleziona un progetto --</option>
        </select>
    </div>

    <div class="field" id="hc-wp-field" style="display:none">
        <label for="hc-wp">Work Package</label>
        <select id="hc-wp">
            <option value="">-- seleziona un WP --</option>
        </select>
    </div>

    <div class="field" id="hc-task-field" style="display:none">
        <label for="hc-task">Task</label>
        <select id="hc-task">
            <option value="">-- seleziona un task --</option>
        </select>
    </div>

    <div id="hc-task-detail" style="display:none">
        <h3>Dettaglio Task</h3>
        <p>Ore previste totali: <span id="hc-tot-previste">-</span></p>
        <p>Ore lavorate totali: <span id="hc-tot-lavorate">-</span></p>

        <form id="hc-ore-form">
            <div class="field">
                <label for="hc-mese">Mese</label>
                <select id="hc-mese"></select>
            </div>
            <div class="field">
                <label for="hc-ore">Ore lavorate</label>
                <input type="number" id="hc-ore" min="0" required>
            </div>
            <button type="submit">Salva ore</button>
        </form>
    </div>

    <button id="btn-hc-logout" type="button">Logout</button>
</div>

<script src="./js/home-collaborator.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        if (window.loadHomeCollaborator) {
            window.loadHomeCollaborator();
        }
    });
</script>
</body>
</html>
