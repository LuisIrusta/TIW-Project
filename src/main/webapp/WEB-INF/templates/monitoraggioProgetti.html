<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Monitoraggio Progetti</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<header>
		<h1>Gestione e rendicontazione progetti</h1>
		<span class="nav">
			<a th:href="@{/homeResponsabile}">Home Responsabile</a>
			<a th:href="@{/monitoraggioCollaboratori}">Monitoraggio Collaboratori</a>
			<a th:href="@{/login}">Logout</a>
		</span>
	</header>
	<main>
		<h2>Monitoraggio Progetti &mdash; <span th:text="${manager.fullName}">Nome Cognome</span></h2>

		<p class="msg-error"   th:if="${errorMsg   != null}" th:text="${errorMsg}">errore</p>
		<p class="msg-success" th:if="${successMsg != null}" th:text="${successMsg}">ok</p>

		<!-- Selezione progetto -->
		<section>
			<form method="get" th:action="@{/monitoraggioProgetti}">
				<div class="field">
					<label for="projId">Progetto</label>
					<select id="projId" name="projId">
						<option value="">-- seleziona un progetto --</option>
						<option th:each="p : ${progetti}"
							th:value="${p.id}"
							th:text="${p.title + ' (' + p.state + ')'}"
							th:selected="${p.id == projId}">progetto</option>
					</select>
				</div>
				<input type="submit" value="VISUALIZZA">
			</form>
		</section>

		<!-- Tabella monitoraggio -->
		<section th:if="${progetto != null and not #lists.isEmpty(wpsData)}">
			<h3>Progetto: <span th:text="${progetto.title}">titolo</span>
				&mdash; <span th:text="${progetto.state}">stato</span>
			</h3>

			<div th:each="wpe : ${wpsData}">
				<h4 th:text="${'WP' + wpe.wp.orderNumber + ' — ' + wpe.wp.title + ' (mesi ' + wpe.wp.startMonth + '–' + wpe.wp.endMonth + ')'}">WP</h4>

				<table border="1">
					<thead>
						<tr>
							<th>Task</th>
							<th th:each="m : ${#numbers.sequence(1, progetto.durationMonths)}"
								th:text="${'M' + m + ' Prev. / Lav.'}">mese</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="te : ${wpe.tasks}">
							<td th:text="${'T' + te.task.orderNumber + ' — ' + te.task.title}">task</td>
							<td th:each="m : ${#numbers.sequence(1, progetto.durationMonths)}">
								<span th:if="${m >= te.task.startMonth and m <= te.task.endMonth}">
									<span th:text="${te.previste[m] != null ? te.previste[m] : '—'}">0</span>
									/
									<span th:text="${te.lavorate[m] != null ? te.lavorate[m] : '—'}"
										th:class="${(te.lavorate[m] != null ? te.lavorate[m] : 0) >= (te.previste[m] != null ? te.previste[m] : 0) ? 'ore-ok' : 'ore-ko'}">0</span>
								</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>

			<!-- Bottone CONCLUDI -->
			<form th:if="${canConclude}" method="post" th:action="@{/concludi-progetto}">
				<input type="hidden" name="projId" th:value="${projId}">
				<input type="submit" value="CONCLUDI PROGETTO">
			</form>
			<p class="hint" th:if="${progetto.assigned and not canConclude}">
				Il bottone CONCLUDI apparirà quando le ore lavorate raggiungeranno quelle previste per ogni task.
			</p>
		</section>

	</main>
</body>
</html>
