  <div class="card">

      <h1>Crea il tuo account</h1>

    <!-- Messaggio errore / successo da register.php via redirect -->
    <?php if (!empty($_GET['errore'])): ?>
      <div class="alert alert--error">
        <?php echo htmlspecialchars($_GET['errore']); ?>
      </div>
    <?php elseif (!empty($_GET['successo'])): ?>
      <div class="alert alert--success">
        <?php echo htmlspecialchars($_GET['successo']); ?>
      </div>
    <?php endif; ?>
 
    <!--
      HTTP POST puro verso register.php
      Nessun JavaScript: il browser costruisce la richiesta al click su Submit
    -->
    <form action="register.php" method="POST" enctype="multipart/form-data">
 
      <!-- first_name + last_name -->
      <div class="row">
        <div class="field">
          <label for="first_name">Nome</label>
          <input type="text"
                 id="first_name"
                 name="first_name"
                 required />
        </div>
        <div class="field">
          <label for="last_name">Cognome</label>
          <input type="text"
                 id="last_name"
                 name="last_name"
                 required />
        </div>
      </div>
 
      <!-- username -->
      <div class="field">
        <label for="username">Username</label>
        <input type="text"
               id="username"
               name="username"
               required />
      </div>
 
      <!-- password -->
      <div class="field">
        <label for="password">Password</label>
        <input type="password"
               id="password"
               name="password"
               required />
      </div>
 
      <!-- conferma password -->
      <div class="field">
        <label for="conferma">Conferma password</label>
        <input type="password"
               id="conferma"
               name="conferma"
               placeholder="Ripeti la password"
               required />
      </div>
 
      <!-- role: ENUM('administrative','technical') -->
      <div class="field">
        <label for="role">Ruolo</label>
        <select id="role" name="role" required>
          <option value="" disabled selected>Seleziona un ruolo</option>
          <option value="administrative">Administrative</option>
          <option value="technical">Technical</option>
        </select>
      </div>
 
      <!-- photo (opzionale) -->
      <div class="field">
        <label for="photo">Foto profilo <span class="optional">(opzionale)</span></label>
        <input type="file"
               id="photo"
               name="photo"
               accept="image/*" />
      </div>
 
      <button type="submit" class="btn">Crea account</button>
 
    </form>
  </div>
 
</body>
</html>
